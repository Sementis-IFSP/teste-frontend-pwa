<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a4a">
    <meta name="application-name" content="Sementis">
    <link rel="manifest" href="pwa/manifest.webmanifest">
    <link rel="icon" href="assets/icons/pwa-icon.svg" type="image/svg+xml">
    <title>Sementis - Ligas</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/ligas.css">
    <link rel="stylesheet" href="css/shared-navbar.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="leagues-page">
    <header class="leagues-header">
        <div class="leagues-header-top">
            <img src="assets/brand/logo_sementis_branco.png" alt="Sementis" class="leagues-logo">
            <span class="league-tier-pill current-tier">Liga Prata</span>
        </div>

        <div class="league-track" aria-label="Progresso de troféus da liga">
            <div class="league-track-item reached">
                <img src="assets/ligas/liga_trofeu_bronze.png" alt="Troféu Bronze">
            </div>
            <div class="league-track-item reached current" aria-current="true">
                <img src="assets/ligas/liga_trofeu_prata.png" alt="Troféu Prata">
            </div>
            <div class="league-track-item upcoming">
                <img src="assets/ligas/liga_trofeu_bloqueado.png" alt="Troféu Bloqueado">
            </div>
            <div class="league-track-item upcoming">
                <img src="assets/ligas/liga_trofeu_bloqueado.png" alt="Troféu Bloqueado">
            </div>
            <div class="league-track-item upcoming">
                <img src="assets/ligas/liga_trofeu_bloqueado.png" alt="Troféu Bloqueado">
            </div>
            <div class="league-track-item upcoming">
                <img src="assets/ligas/liga_trofeu_bloqueado.png" alt="Troféu Bloqueado">
            </div>
        </div>
    </header>

    <main class="ranking-wrapper">
        <section class="ranking-card" aria-label="Classificacao da liga">
            
            <ol class="ranking-list" id="rankingList">
            </ol>

        </section>
    </main>

    <div id="shared-navbar-root"></div>

    <script src="pwa/pwa-register.js"></script>
    <script src="js/shared-navbar.js"></script>
    
    <script src="js/ligas.js"></script>
</body>
</html>
