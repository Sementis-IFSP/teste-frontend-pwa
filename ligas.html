<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a4a">
    <meta name="application-name" content="Sementis">
    <link rel="manifest" href="pwa/manifest.webmanifest">
    <link rel="icon" href="assets/icons/pwa-icon.svg" type="image/svg+xml">
    <title>Sementis - Ligas</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/ligas.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="leagues-page">
    <header class="leagues-header">
        <div class="leagues-header-top">
            <img src="assets/brand/logo_sementis_branco.png" alt="Sementis" class="leagues-logo">
            <span class="league-tier-pill current-tier">Liga Prata</span>
        </div>

        <div class="league-track" aria-label="Progresso de troféus da liga">
            <div class="league-track-item reached">
                <img src="assets/ligas/liga_trofeu_bronze.png" alt="Troféu Bronze">
            </div>
            <div class="league-track-item reached current" aria-current="true">
                <img src="assets/ligas/liga_trofeu_prata.png" alt="Troféu Prata">
            </div>
            <div class="league-track-item upcoming">
                <img src="assets/ligas/liga_trofeu_bloqueado.png" alt="Troféu Bloqueado">
            </div>
            <div class="league-track-item upcoming">
                <img src="assets/ligas/liga_trofeu_bloqueado.png" alt="Troféu Bloqueado">
            </div>
            <div class="league-track-item upcoming">
                <img src="assets/ligas/liga_trofeu_bloqueado.png" alt="Troféu Bloqueado">
            </div>
            <div class="league-track-item upcoming">
                <img src="assets/ligas/liga_trofeu_bloqueado.png" alt="Troféu Bloqueado">
            </div>
        </div>
    </header>

    <main class="ranking-wrapper">
        <section class="ranking-card" aria-label="Classificacao da liga">
            <ol class="ranking-list">
                <li class="ranking-row top-1">
                    <div class="rank-badge">
                        <img src="assets/ligas/liga_medalha_ouro.png" alt="1º lugar">
                    </div>
                    <div class="player-avatar"><img src="assets/icons/icone_usuario.png" alt="Avatar"></div>
                    <div class="player-meta">
                        <h3>COD (nao o Luckey)</h3>
                    </div>
                    <div class="player-xp">XP 1.910</div>
                </li>
                <li class="ranking-row top-2">
                    <div class="rank-badge">
                        <img src="assets/ligas/liga_medalha_prata.png" alt="2º lugar">
                    </div>
                    <div class="player-avatar"><img src="assets/icons/icone_usuario.png" alt="Avatar"></div>
                    <div class="player-meta">
                        <h3>Gratia666</h3>
                    </div>
                    <div class="player-xp">XP 1.870</div>
                </li>
                <li class="ranking-row top-3">
                    <div class="rank-badge">
                        <img src="assets/ligas/liga_medalha_bronze.png" alt="3º lugar">
                    </div>
                    <div class="player-avatar"><img src="assets/icons/icone_usuario.png" alt="Avatar"></div>
                    <div class="player-meta">
                        <h3>Siix!S&ven</h3>
                    </div>
                    <div class="player-xp">XP 1.590</div>
                </li>
                <li class="ranking-row">
                    <div class="rank-number">4</div>
                    <div class="player-avatar"><img src="assets/icons/icone_usuario.png" alt="Avatar"></div>
                    <div class="player-meta">
                        <h3>Maria Ines</h3>
                    </div>
                    <div class="player-xp">XP 1.231</div>
                </li>
                <li class="ranking-row">
                    <div class="rank-number">5</div>
                    <div class="player-avatar"><img src="assets/icons/icone_usuario.png" alt="Avatar"></div>
                    <div class="player-meta">
                        <h3>Yesi</h3>
                    </div>
                    <div class="player-xp">XP 1.199</div>
                </li>
                <li class="ranking-row">
                    <div class="rank-number">6</div>
                    <div class="player-avatar"><img src="assets/icons/icone_usuario.png" alt="Avatar"></div>
                    <div class="player-meta">
                        <h3>Soratto556</h3>
                    </div>
                    <div class="player-xp">XP 978</div>
                </li>
                <li class="ranking-row">
                    <div class="rank-number">7</div>
                    <div class="player-avatar"><img src="assets/icons/icone_usuario.png" alt="Avatar"></div>
                    <div class="player-meta">
                        <h3>ZanqMeta</h3>
                    </div>
                    <div class="player-xp">XP 875</div>
                </li>
            </ol>
        </section>
    </main>

    <nav class="bottom-nav" aria-label="Navegacao principal">
        <div class="sidebar-logo">
            <img src="assets/brand/logo_sementis_branco.png" alt="Sementis">
        </div>
        <div class="nav-items-wrapper">
            <a class="nav-item" href="home.html">
                <img src="assets/icons/menu_rodape_tarefa.png" alt="Trilhas">
                <span>Trilhas</span>
            </a>
            <a class="nav-item active" href="ligas.html" aria-current="page">
                <img src="assets/icons/menu_rodape_trofeu_liga.png" alt="Ligas">
                <span>Ligas</span>
            </a>
            <a class="nav-item" href="home.html">
                <img src="assets/icons/menu_rodape_alvo.png" alt="Missões">
                <span>Missões</span>
            </a>
            <a class="nav-item" href="home.html">
                <img src="assets/icons/menu_rodape_usuario.png" alt="Perfil">
                <span>Perfil</span>
            </a>
        </div>
    </nav>

    <script src="pwa/pwa-register.js"></script>
</body>
</html>
